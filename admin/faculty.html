<!-- Faculty Management Component -->
<div class="faculty-view">
    <div class="section-header">
        <h3>Faculty Management</h3>
        <button class="btn btn-primary" id="addFacultyBtn">
            <i class="fas fa-plus"></i> Add Faculty
        </button>
    </div>
    <div class="table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Faculty ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Position</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="facultyTableBody">
                <!-- Faculty will be populated here via JS -->
            </tbody>
        </table>
    </div>
</div>
