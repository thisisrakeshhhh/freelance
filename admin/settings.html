<!-- Settings Component -->
<div class="settings-view">
    <h3>System Settings</h3>
    <div class="settings-card">
        <h4>General Settings</h4>
        <div class="setting-item">
            <label>College Name</label>
            <input type="text" value="ST. XAVIER'S" class="form-input" id="collegeName">
        </div>
        <div class="setting-item">
            <label>Academic Year</label>
            <input type="text" value="2024-2025" class="form-input" id="academicYear">
        </div>
        <div class="setting-item">
            <label>Admin Email</label>
            <input type="email" value="admin@stxaviers.edu" class="form-input" id="adminEmail">
        </div>
        <button class="btn btn-primary save-settings-btn">
            <i class="fas fa-save"></i> Save Changes
        </button>
    </div>
</div>
