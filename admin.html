<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login • College CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #4a6cf7;
            --primary-dark: #3b5ad9;
            --text: #2d3436;
            --bg: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            width: 80px;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 10px;
            color: var(--primary);
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: var(--primary-dark);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            font-size: 14px;
            color: #888;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .demo-hint {
            margin-top: 15px;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <img src="assets/images/logo.png" alt="Logo" class="logo">
        <h2>Admin Login</h2>
        <p>Enter your credentials to access the dashboard</p>

        <form id="adminLoginForm">
            <div class="input-group">
                <input type="text" id="adminId" placeholder="Admin ID" required>
            </div>
            <div class="input-group">
                <input type="password" id="adminPass" placeholder="Password" required>
                <button type="button" class="toggle-password" onclick="togglePass()">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Login</button>
        </form>

        <p class="demo-hint">Demo: admin / 123</p>
        <a href="index.html" class="back-link">Back to Home</a>
    </div>

    <script src="js/toast.js"></script>
    <script>
        function togglePass() {
            const passInput = document.getElementById('adminPass');
            const icon = document.getElementById('eyeIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                passInput.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        document.getElementById('adminLoginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const id = document.getElementById('adminId').value;
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('loginBtn');

            if (id === 'admin' && pass === '123') {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
                btn.disabled = true;

                // Simulate network delay
                setTimeout(() => {
                    localStorage.setItem('userRole', 'admin');
                    window.location.href = 'dashboard/admin-dashboard.html';
                }, 800);
            } else {
                alert('Invalid Credentials! Try admin / 123');
            }
        });
    </script>
</body>

</html>
