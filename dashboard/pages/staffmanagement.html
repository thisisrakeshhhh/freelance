<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management Dashboard</title>
    <link rel="stylesheet" href="pages-common.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 Staff Management System</h1>
            <p>Manage your staff members efficiently</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3 id="totalStaff">0</h3>
                <p>Total Staff</p>
            </div>
            <div class="stat-card">
                <h3 id="activeStaff">0</h3>
                <p>Active Staff</p>
            </div>
            <div class="stat-card">
                <h3 id="teachingStaff">0</h3>
                <p>Teaching Staff</p>
            </div>
            <div class="stat-card">
                <h3 id="nonTeachingStaff">0</h3>
                <p>Non-Teaching Staff</p>
            </div>
        </div>

        <div class="content">
            <div class="form-section">
                <h2 id="formTitle">Add New Staff Member</h2>
                <form id="staffForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="name">Full Name *</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" required>
                        </div>
                        <div class="form-group">
                            <label for="department">Department *</label>
                            <select id="department" required>
                                <option value="">Select Department</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Mathematics">Mathematics</option>
                                <option value="Physics">Physics</option>
                                <option value="Chemistry">Chemistry</option>
                                <option value="English">English</option>
                                <option value="Administration">Administration</option>
                                <option value="Library">Library</option>
                                <option value="Sports">Sports</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="position">Position *</label>
                            <input type="text" id="position" required>
                        </div>
                        <div class="form-group">
                            <label for="staffType">Staff Type *</label>
                            <select id="staffType" required>
                                <option value="">Select Type</option>
                                <option value="Teaching">Teaching</option>
                                <option value="Non-Teaching">Non-Teaching</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="qualification">Qualification *</label>
                            <input type="text" id="qualification" required>
                        </div>
                        <div class="form-group">
                            <label for="salary">Salary *</label>
                            <input type="number" id="salary" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="joiningDate">Joining Date *</label>
                            <input type="date" id="joiningDate" required>
                        </div>
                        <div class="form-group">
                            <label for="status">Status *</label>
                            <select id="status" required>
                                <option value="">Select Status</option>
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address">
                        </div>
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary" id="submitBtn">Add Staff Member</button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none;">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="filter-section">
                <input type="text" id="searchInput" placeholder="🔍 Search by name, email, position...">
                <select id="departmentFilter">
                    <option value="">All Departments</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="English">English</option>
                    <option value="Administration">Administration</option>
                    <option value="Library">Library</option>
                    <option value="Sports">Sports</option>
                </select>
                <select id="typeFilter">
                    <option value="">All Types</option>
                    <option value="Teaching">Teaching</option>
                    <option value="Non-Teaching">Non-Teaching</option>
                </select>
                <select id="statusFilter">
                    <option value="">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Position</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="staffTableBody">
                        <tr class="no-data">
                            <td colspan="8">No staff members found. Add your first staff member!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- View Details Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Staff Details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="staffDetails"></div>
        </div>
    </div>

    <script>
        let staffMembers = [];
        let editingId = null;

        function init() {
            renderTable();
            updateStats();
        }

        // Handle form submission
        document.getElementById('staffForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const staff = {
                id: editingId || Date.now(),
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                department: document.getElementById('department').value,
                position: document.getElementById('position').value,
                staffType: document.getElementById('staffType').value,
                qualification: document.getElementById('qualification').value,
                salary: document.getElementById('salary').value,
                joiningDate: document.getElementById('joiningDate').value,
                status: document.getElementById('status').value,
                address: document.getElementById('address').value
            };

            if (editingId) {
                const index = staffMembers.findIndex(s => s.id === editingId);
                staffMembers[index] = staff;
                editingId = null;
                document.getElementById('submitBtn').textContent = 'Add Staff Member';
                document.getElementById('formTitle').textContent = 'Add New Staff Member';
                document.getElementById('cancelBtn').style.display = 'none';
            } else {
                staffMembers.push(staff);
            }

            this.reset();
            renderTable();
            updateStats();
        });

        // Cancel editing
        document.getElementById('cancelBtn').addEventListener('click', function() {
            editingId = null;
            document.getElementById('staffForm').reset();
            document.getElementById('submitBtn').textContent = 'Add Staff Member';
            document.getElementById('formTitle').textContent = 'Add New Staff Member';
            this.style.display = 'none';
        });

        // Filter functionality
        ['searchInput', 'departmentFilter', 'typeFilter', 'statusFilter'].forEach(id => {
            document.getElementById(id).addEventListener('input', filterStaff);
        });

        function filterStaff() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const department = document.getElementById('departmentFilter').value;
            const type = document.getElementById('typeFilter').value;
            const status = document.getElementById('statusFilter').value;

            const filtered = staffMembers.filter(staff => {
                const matchesSearch = staff.name.toLowerCase().includes(searchTerm) ||
                                    staff.email.toLowerCase().includes(searchTerm) ||
                                    staff.position.toLowerCase().includes(searchTerm);
                const matchesDepartment = !department || staff.department === department;
                const matchesType = !type || staff.staffType === type;
                const matchesStatus = !status || staff.status === status;

                return matchesSearch && matchesDepartment && matchesType && matchesStatus;
            });

            renderTable(filtered);
        }

        // Render table
        function renderTable(data = staffMembers) {
            const tbody = document.getElementById('staffTableBody');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr class="no-data"><td colspan="8">No staff members found.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(staff => `
                <tr>
                    <td>${staff.id}</td>
                    <td>${staff.name}</td>
                    <td>${staff.email}</td>
                    <td>${staff.department}</td>
                    <td>${staff.position}</td>
                    <td>${staff.staffType}</td>
                    <td><span class="status-badge status-${staff.status.toLowerCase()}">${staff.status}</span></td>
                    <td>
                        <button class="action-btn view-btn" onclick="viewStaff(${staff.id})">View</button>
                        <button class="action-btn edit-btn" onclick="editStaff(${staff.id})">Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteStaff(${staff.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        // View staff details
        function viewStaff(id) {
            const staff = staffMembers.find(s => s.id === id);
            if (staff) {
                const details = `
                    <div class="detail-row">
                        <div class="detail-label">ID:</div>
                        <div class="detail-value">${staff.id}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Name:</div>
                        <div class="detail-value">${staff.name}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Email:</div>
                        <div class="detail-value">${staff.email}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Phone:</div>
                        <div class="detail-value">${staff.phone}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Department:</div>
                        <div class="detail-value">${staff.department}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Position:</div>
                        <div class="detail-value">${staff.position}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Staff Type:</div>
                        <div class="detail-value">${staff.staffType}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Qualification:</div>
                        <div class="detail-value">${staff.qualification}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Salary:</div>
                        <div class="detail-value">₹${parseFloat(staff.salary).toLocaleString()}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Joining Date:</div>
                        <div class="detail-value">${new Date(staff.joiningDate).toLocaleDateString()}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Status:</div>
                        <div class="detail-value"><span class="status-badge status-${staff.status.toLowerCase()}">${staff.status}</span></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Address:</div>
                        <div class="detail-value">${staff.address || 'N/A'}</div>
                    </div>
                `;
                document.getElementById('staffDetails').innerHTML = details;
                document.getElementById('viewModal').classList.add('active');
            }
        }

        function closeModal() {
            document.getElementById('viewModal').classList.remove('active');
        }

        // Edit staff
        function editStaff(id) {
            const staff = staffMembers.find(s => s.id === id);
            if (staff) {
                editingId = id;
                document.getElementById('name').value = staff.name;
                document.getElementById('email').value = staff.email;
                document.getElementById('phone').value = staff.phone;
                document.getElementById('department').value = staff.department;
                document.getElementById('position').value = staff.position;
                document.getElementById('staffType').value = staff.staffType;
                document.getElementById('qualification').value = staff.qualification;
                document.getElementById('salary').value = staff.salary;
                document.getElementById('joiningDate').value = staff.joiningDate;
                document.getElementById('status').value = staff.status;
                document.getElementById('address').value = staff.address;
                
                document.getElementById('submitBtn').textContent = 'Update Staff Member';
                document.getElementById('formTitle').textContent = 'Edit Staff Member';
                document.getElementById('cancelBtn').style.display = 'inline-block';
                
                document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Delete staff
        function deleteStaff(id) {
            if (confirm('Are you sure you want to delete this staff member?')) {
                staffMembers = staffMembers.filter(s => s.id !== id);
                renderTable();
                updateStats();
            }
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalStaff').textContent = staffMembers.length;
            document.getElementById('activeStaff').textContent = staffMembers.filter(s => s.status === 'Active').length;
            document.getElementById('teachingStaff').textContent = staffMembers.filter(s => s.staffType === 'Teaching').length;
            document.getElementById('nonTeachingStaff').textContent = staffMembers.filter(s => s.staffType === 'Non-Teaching').length;
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('viewModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        init();
    </script>
</body>
</html>
