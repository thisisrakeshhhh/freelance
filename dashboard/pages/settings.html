<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Settings</title>
    <link rel="stylesheet" href="pages-common.css">
</head>
<body>

  <div class="container">
    <h1>Website Settings</h1>

    <div class="setting">
      <label for="darkMode">Dark Mode</label>
      <input type="checkbox" id="darkMode">
    </div>

    <div class="setting">
      <label for="notifications">Enable Notifications</label>
      <input type="checkbox" id="notifications">
    </div>

    <div class="setting">
      <label for="language">Language</label>
      <select id="language">
        <option value="english">English</option>
        <option value="hindi">Hindi</option>
        <option value="spanish">Spanish</option>
      </select>
    </div>

    <button class="save-btn" onclick="saveSettings()">Save Settings</button>
    <div class="status" id="status">No changes saved yet.</div>
  </div>

  <script>
    function saveSettings() {
      const darkMode = document.getElementById('darkMode').checked;
      const notifications = document.getElementById('notifications').checked;
      const language = document.getElementById('language').value;

      // Save settings in localStorage
      localStorage.setItem('darkMode', darkMode);
      localStorage.setItem('notifications', notifications);
      localStorage.setItem('language', language);

      // Update status message
      document.getElementById('status').textContent = "Settings saved successfully!";
      
      // Apply dark mode immediately
      document.body.style.backgroundColor = darkMode ? '#1f2937' : '#f9fafb';
      document.body.style.color = darkMode ? '#f9fafb' : '#1f2937';
    }

    // Load saved settings on page load
    window.onload = () => {
      const darkMode = localStorage.getItem('darkMode') === 'true';
      const notifications = localStorage.getItem('notifications') === 'true';
      const language = localStorage.getItem('language') || 'english';

      document.getElementById('darkMode').checked = darkMode;
      document.getElementById('notifications').checked = notifications;
      document.getElementById('language').value = language;

      if(darkMode) {
        document.body.style.backgroundColor = '#1f2937';
        document.body.style.color = '#f9fafb';
      }
    }
  </script>
</body>
</html>
