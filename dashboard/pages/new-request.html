<div class="card">
    <div class="card-header">
        <h3 class="card-title">
            <span class="card-icon">📝</span>
            Apply for New Request
        </h3>
    </div>
    <div style="padding: 20px;">
        <div style="background: var(--bg); padding: 24px; border-radius: 12px;">

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Request
                    Type</label>
                <select
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
                    <option>Select request type</option>
                    <option>Bonafide Certificate</option>
                    <option>No Objection Certificate</option>
                    <option>Transfer Certificate</option>
                    <option>Migration Certificate</option>
                    <option>Duplicate ID Card</option>
                    <option>Course Completion Certificate</option>
                    <option>Other</option>
                </select>
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Request
                    Details</label>
                <textarea rows="4" placeholder="Please provide details about your request..."
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; resize: vertical;"></textarea>
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Purpose</label>
                <input type="text" placeholder="e.g., Bank loan, Scholarship application"
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Attach
                    Supporting Documents (if any)</label>
                <input type="file" multiple
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
            </div>

            <button
                style="width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
                Submit Request
            </button>
        </div>

        <div
            style="margin-top: 20px; padding: 16px; background: #f0f9ff; border-radius: 12px; border-left: 4px solid #3b82f6;">
            <p style="margin: 0; color: #1e40af; font-size: 14px;">
                <strong>ℹ️ Note:</strong> Requests typically take 3-5 business days to process. You will be notified via
                email once your request is ready.
            </p>
        </div>
    </div>
</div>
