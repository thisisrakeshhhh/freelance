<div class="card">
    <div class="card-header">
        <h3 class="card-title">
            <span class="card-icon">📝</span>
            Apply for Leave
        </h3>
    </div>
    <div style="padding: 20px;">
        <div style="background: var(--bg); padding: 24px; border-radius: 12px;">

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Leave
                    Type</label>
                <select
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
                    <option>Select leave type</option>
                    <option>Sick Leave</option>
                    <option>Casual Leave</option>
                    <option>Emergency Leave</option>
                    <option>Other</option>
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">From
                        Date</label>
                    <input type="date"
                        style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">To
                        Date</label>
                    <input type="date"
                        style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
                </div>
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Reason for
                    Leave</label>
                <textarea rows="4" placeholder="Please describe your reason..."
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; resize: vertical;"></textarea>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Attach Document
                    (Optional)</label>
                <input type="file"
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
            </div>

            <button
                style="width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
                Submit Leave Application
            </button>
        </div>
    </div>
</div>
