<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Examination | St. Xavier's</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{font-family:Inter,Arial,sans-serif;background:#f1f5f9;margin:0;padding:20px;}
    .container{max-width:1200px;margin:auto;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);overflow:hidden;}
    .header{background:#4f46e5;color:#fff;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;}
    .content{padding:30px;}
    h3{margin-top:0;color:#1f2933;}

    .tabs{display:flex;gap:10px;margin-bottom:20px;}
    .tab{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:600;background:#e5e7eb;}
    .tab.active{background:#4f46e5;color:#fff;}

    table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:30px;}
    th,td{padding:12px;text-align:center;border:1px solid #ddd;}
    th{background:#eef2ff;}

    .badge-upcoming{background:#dcfce7;color:#166534;padding:4px 10px;border-radius:20px;font-size:12px;}
    .badge-previous{background:#fee2e2;color:#991b1b;padding:4px 10px;border-radius:20px;font-size:12px;}

    .notice-box{margin-top:20px;background:#fef3c7;padding:15px;border-radius:8px;color:#92400e;font-size:14px;}

    .btn{padding:8px 14px;border:none;border-radius:6px;font-weight:600;cursor:pointer;}
    .btn-add{background:#16a34a;color:white;}
    .btn-delete{background:#dc2626;color:white;}

    .controls{display:flex;gap:10px;margin-bottom:15px;}
    input,select{padding:8px;border:1px solid #ccc;border-radius:6px;}
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>Examination Management</h2>
    <span>B.Sc Computer Science</span>
  </div>

  <div class="content">

    <div class="tabs">
      <button class="tab active" onclick="showTab('upcoming')">Upcoming Exams</button>
      <button class="tab" onclick="showTab('previous')">Previous Exams</button>
    </div>

    <!-- UPCOMING EXAMS -->
    <div id="upcoming" class="tab-content">

      <div class="controls">
        <input id="u_subject" placeholder="Subject">
        <input id="u_date" type="date">
        <input id="u_time" placeholder="Time">
        <input id="u_room" placeholder="Room No">
        <button class="btn btn-add" onclick="addUpcoming()">Add Upcoming</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Exam ID</th>
            <th>Subject</th>
            <th>Date</th>
            <th>Time</th>
            <th>Room</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="upcomingBody"></tbody>
      </table>

      <div class="notice-box">
        ⚠ Students must carry their valid ID cards and arrive 30 minutes before the exam time.
      </div>
    </div>

    <!-- PREVIOUS EXAMS -->
    <div id="previous" class="tab-content" style="display:none;">

      <table>
        <thead>
          <tr>
            <th>Exam ID</th>
            <th>Subject</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
            <th>Result</th>
          </tr>
        </thead>
        <tbody id="previousBody"></tbody>
      </table>

    </div>

  </div>
</div>

<script>
  // Dummy Data
  let upcomingExams = JSON.parse(localStorage.getItem('upcoming_exams')) || [
    {id:'EX101', subject:'Data Structures', date:'2025-01-15', time:'10:00 AM', room:'A-101'},
    {id:'EX102', subject:'Operating Systems', date:'2025-01-18', time:'2:00 PM', room:'B-204'}
  ];

  let previousExams = JSON.parse(localStorage.getItem('previous_exams')) || [
    {id:'EX090', subject:'DBMS', date:'2024-12-05', time:'10:00 AM', status:'Completed', result:'Published'},
    {id:'EX091', subject:'Computer Networks', date:'2024-12-08', time:'2:00 PM', status:'Completed', result:'Published'}
  ];

  function render(){
    const uBody = document.getElementById('upcomingBody');
    const pBody = document.getElementById('previousBody');
    uBody.innerHTML = '';
    pBody.innerHTML = '';

    upcomingExams.forEach((e,i)=>{
      uBody.innerHTML += `
        <tr>
          <td>${e.id}</td>
          <td>${e.subject}</td>
          <td>${e.date}</td>
          <td>${e.time}</td>
          <td>${e.room}</td>
          <td><span class="badge-upcoming">Upcoming</span></td>
          <td><button class="btn btn-delete" onclick="removeUpcoming(${i})">Remove</button></td>
        </tr>`;
    });

    previousExams.forEach(e=>{
      pBody.innerHTML += `
        <tr>
          <td>${e.id}</td>
          <td>${e.subject}</td>
          <td>${e.date}</td>
          <td>${e.time}</td>
          <td><span class="badge-previous">Completed</span></td>
          <td>${e.result}</td>
        </tr>`;
    });

    localStorage.setItem('upcoming_exams', JSON.stringify(upcomingExams));
    localStorage.setItem('previous_exams', JSON.stringify(previousExams));
  }

  function addUpcoming(){
    const subject = u_subject.value;
    const date = u_date.value;
    const time = u_time.value;
    const room = u_room.value;

    if(!subject || !date || !time || !room){ alert('Fill all fields'); return; }

    const id = 'EX' + Math.floor(Math.random()*900+100);
    upcomingExams.push({id, subject, date, time, room});
    u_subject.value=''; u_date.value=''; u_time.value=''; u_room.value='';
    render();
  }

  function removeUpcoming(index){
    if(confirm('Remove this upcoming exam?')){
      upcomingExams.splice(index,1);
      render();
    }
  }

  function showTab(type){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    if(type==='upcoming'){
      document.getElementById('upcoming').style.display='block';
      document.getElementById('previous').style.display='none';
      document.querySelectorAll('.tab')[0].classList.add('active');
    }else{
      document.getElementById('previous').style.display='block';
      document.getElementById('upcoming').style.display='none';
      document.querySelectorAll('.tab')[1].classList.add('active');
    }
  }

  render();
</script>

</body>
</html>
