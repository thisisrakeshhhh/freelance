<div class="card">
    <div class="card-header">
        <h3 class="card-title">
            <span class="card-icon">💰</span>
            Online Payment
        </h3>
    </div>
    <div style="padding: 20px;">
        <div
            style="padding: 20px; background: #f0fdf4; border-radius: 12px; margin-bottom: 24px; border-left: 4px solid #10b981;">
            <p style="margin: 0; color: #065f46; font-weight: 600;">✓ All Fees Paid</p>
            <p style="margin: 8px 0 0 0; color: #10b981; font-size: 14px;">You have no pending payments at this time.
            </p>
        </div>

        <div style="background: var(--bg); padding: 24px; border-radius: 12px;">
            <h4 style="margin: 0 0 16px 0; color: var(--text);">Make a Payment</h4>

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Select Fee
                    Type</label>
                <select
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
                    <option>Semester Fee</option>
                    <option>Exam Fee</option>
                    <option>Library Fee</option>
                    <option>Sports Fee</option>
                    <option>Other</option>
                </select>
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Amount
                    (₹)</label>
                <input type="number" placeholder="Enter amount"
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Payment
                    Method</label>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px;">
                    <button
                        style="padding: 12px; border: 2px solid var(--primary); background: rgba(67, 97, 238, 0.1); color: var(--primary); border-radius: 8px; cursor: pointer; font-weight: 600;">
                        💳 Card
                    </button>
                    <button
                        style="padding: 12px; border: 2px solid #e2e8f0; background: white; color: var(--text); border-radius: 8px; cursor: pointer; font-weight: 600;">
                        🏦 UPI
                    </button>
                    <button
                        style="padding: 12px; border: 2px solid #e2e8f0; background: white; color: var(--text); border-radius: 8px; cursor: pointer; font-weight: 600;">
                        🏧 Net Banking
                    </button>
                </div>
            </div>

            <button
                style="width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
                Proceed to Payment
            </button>
        </div>
    </div>
</div>
