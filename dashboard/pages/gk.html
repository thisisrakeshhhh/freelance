<div class="card">
    <div class="card-header">
        <h3 class="card-title">
            <span class="card-icon">🧠</span>
            General Knowledge - Q/A
        </h3>
    </div>
    <div style="padding: 20px;">
        <div
            style="margin-bottom: 16px; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; color: white; text-align: center;">
            <div style="font-size: 48px; font-weight: 800; margin-bottom: 4px;">125</div>
            <div style="font-size: 14px; opacity: 0.9;">Your GK Score</div>
        </div>

        <div style="background: var(--bg); padding: 20px; border-radius: 12px; margin-bottom: 16px;">
            <h4 style="margin: 0 0 12px 0; color: var(--text);">Question of the Day</h4>
            <p style="margin: 0 0 16px 0; color: var(--text); font-size: 15px; line-height: 1.6;">
                <strong>Q:</strong> Which is the largest ocean on Earth?
            </p>
            <div style="display: grid; gap: 10px;">
                <label
                    style="padding: 12px; background: white; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s;">
                    <input type="radio" name="ocean" style="margin-right: 10px;">
                    Atlantic Ocean
                </label>
                <label
                    style="padding: 12px; background: white; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s;">
                    <input type="radio" name="ocean" style="margin-right: 10px;">
                    Indian Ocean
                </label>
                <label
                    style="padding: 12px; background: white; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s;">
                    <input type="radio" name="ocean" style="margin-right: 10px;">
                    Pacific Ocean
                </label>
                <label
                    style="padding: 12px; background: white; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s;">
                    <input type="radio" name="ocean" style="margin-right: 10px;">
                    Arctic Ocean
                </label>
            </div>
            <button
                style="width: 100%; margin-top: 16px; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                Submit Answer
            </button>
        </div>

        <div style="background: var(--bg); padding: 20px; border-radius: 12px;">
            <h4 style="margin: 0 0 12px 0; color: var(--text);">Recent Quiz Results</h4>
            <div class="subject-list">
                <div class="subject-item">
                    <div>
                        <div class="subject-name">World Geography Quiz</div>
                        <div class="subject-code">Dec 10, 2024</div>
                    </div>
                    <span class="attendance-badge attendance-good">8/10</span>
                </div>
                <div class="subject-item">
                    <div>
                        <div class="subject-name">Science & Technology</div>
                        <div class="subject-code">Dec 8, 2024</div>
                    </div>
                    <span class="attendance-badge attendance-good">9/10</span>
                </div>
                <div class="subject-item">
                    <div>
                        <div class="subject-name">History Quiz</div>
                        <div class="subject-code">Dec 5, 2024</div>
                    </div>
                    <span class="attendance-badge attendance-warning">6/10</span>
                </div>
            </div>
        </div>
    </div>
</div>
