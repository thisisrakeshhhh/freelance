<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Student | St. Xavier's</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/landing.css">
    <link rel="stylesheet" href="pages-common.css">
</head>
<body>

  <div class="page-module-container">
    <section class="module-header">
      <h2>Add New Student</h2>
    </section>

    <section class="module-content">
      <form id="addStudentForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="fullName" required>
          </div>

          <div class="form-group">
            <label>Roll Number *</label>
            <input type="text" id="rollNumber" required>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email">
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone">
          </div>

          <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob">
          </div>

          <div class="form-group">
            <label>Gender</label>
            <select id="gender">
              <option value="">Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label>Course / Program</label>
            <select id="course">
              <option value="">Select Course</option>
              <option>B.Tech Computer Science</option>
              <option>B.Tech Electronics</option>
              <option>B.Sc Mathematics</option>
              <option>B.Com Accounting</option>
              <option>B.A English</option>
            </select>
          </div>

          <div class="form-group">
            <label>Year / Semester</label>
            <select id="year">
              <option value="">Select Year</option>
              <option>1st Year</option>
              <option>2nd Year</option>
              <option>3rd Year</option>
              <option>4th Year</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Address</label>
          <textarea id="address" rows="3" placeholder="Enter full address..."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="resetForm()">Clear Form</button>
          <button type="submit" class="btn btn-primary">Add Student</button>
        </div>
      </form>

      <div id="successMessage" class="success-message">
        <strong>Success!</strong> Student has been added successfully.
      </div>
    </section>
  </div>

  <script>
    const form = document.getElementById('addStudentForm');
    const successMsg = document.getElementById('successMessage');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const student = {
        id: Date.now(),
        fullName: document.getElementById('fullName').value.trim(),
        rollNumber: document.getElementById('rollNumber').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        dob: document.getElementById('dob').value,
        gender: document.getElementById('gender').value,
        course: document.getElementById('course').value,
        year: document.getElementById('year').value,
        address: document.getElementById('address').value.trim(),
        joinDate: new Date().toLocaleDateString()
      };

      let students = JSON.parse(localStorage.getItem('college_students') || '[]');
      students.push(student);
      localStorage.setItem('college_students', JSON.stringify(students));

      successMsg.style.display = 'flex';
      setTimeout(() => successMsg.style.display = 'none', 4000);

      form.reset();

        if (typeof Toast !== 'undefined') {
        Toast.success('Student added successfully!');
      }
    });

    function resetForm() {
      form.reset();
      successMsg.style.display = 'none';
    }
  </script>

</body>
</html>
