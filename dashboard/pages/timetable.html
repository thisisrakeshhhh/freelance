<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Class Timetable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pages-common.css">
</head>
<body>

<div class="container">
  <h2>Class Timetable</h2>

  <div class="form-box">
    <input id="cls" placeholder="Class (e.g. BCA-6)">
    <select id="day">
      <option value="">Select Day</option>
      <option>Monday</option>
      <option>Tuesday</option>
      <option>Wednesday</option>
      <option>Thursday</option>
      <option>Friday</option>
      <option>Saturday</option>
    </select>
    <input id="subject" placeholder="Subject">
    <input id="time" placeholder="Time (e.g. 10–11 AM)">
    <button class="add-btn" onclick="addTimeTable()">Add</button>
  </div>

  <!-- Dummy Table Data -->
  <div id="tableBox">
    <table>
      <tr>
        <th>Class</th>
        <th>Day</th>
        <th>Subject</th>
        <th>Time</th>
        <th>Action</th>
      </tr>
      <tr>
        <td>BCA-6</td>
        <td>Monday</td>
        <td>Maths</td>
        <td>10–11 AM</td>
        <td><button class="del-btn" onclick="deleteRow(1)">Delete</button></td>
      </tr>
      <tr>
        <td>BCA-6</td>
        <td>Tuesday</td>
        <td>Physics</td>
        <td>11–12 AM</td>
        <td><button class="del-btn" onclick="deleteRow(2)">Delete</button></td>
      </tr>
      <tr>
        <td>BCA-6</td>
        <td>Wednesday</td>
        <td>Computer Science</td>
        <td>12–1 PM</td>
        <td><button class="del-btn" onclick="deleteRow(3)">Delete</button></td>
      </tr>
    </table>
  </div>
</div>

<script>
  // Now JS can handle adding/deleting dynamically
  let timetable = [
    {id: 1, cls: "BCA-6", day: "Monday", subject: "Maths", time: "10–11 AM"},
    {id: 2, cls: "BCA-6", day: "Tuesday", subject: "Physics", time: "11–12 AM"},
    {id: 3, cls: "BCA-6", day: "Wednesday", subject: "Computer Science", time: "12–1 PM"}
  ];

  function addTimeTable() {
    const cls = document.getElementById('cls').value.trim();
    const day = document.getElementById('day').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const time = document.getElementById('time').value.trim();

    if (!cls || !day || !subject || !time) {
      alert('Please fill all fields');
      return;
    }

    const id = Date.now();
    timetable.push({id, cls, day, subject, time});
    renderTable();
  }

  function deleteRow(id) {
    timetable = timetable.filter(t => t.id !== id);
    renderTable();
  }

  function renderTable() {
    const box = document.getElementById('tableBox');
    if (timetable.length === 0) {
      box.innerHTML = '<div class="empty">No timetable added</div>';
      return;
    }

    let html = `<table>
      <tr>
        <th>Class</th>
        <th>Day</th>
        <th>Subject</th>
        <th>Time</th>
        <th>Action</th>
      </tr>`;
    timetable.forEach(t => {
      html += `<tr>
        <td>${t.cls}</td>
        <td>${t.day}</td>
        <td>${t.subject}</td>
        <td>${t.time}</td>
        <td><button class="del-btn" onclick="deleteRow(${t.id})">Delete</button></td>
      </tr>`;
    });
    html += '</table>';
    box.innerHTML = html;
  }
</script>

</body>
</html>
