<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Class Timetable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#f4f6f9;
      margin:0;
      padding:20px;
    }
    .container{
      max-width:900px;
      margin:auto;
      background:#fff;
      padding:20px;
      border-radius:8px;
      box-shadow:0 10px 20px rgba(0,0,0,0.1);
    }
    h2{
      text-align:center;
      margin-bottom:20px;
    }
    .form-box{
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:10px;
      margin-bottom:20px;
    }
    .form-box input, .form-box select{
      padding:10px;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:14px;
    }
    button{
      padding:10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:600;
    }
    .add-btn{ background:#2563eb; color:#fff; }
    .del-btn{ background:#dc2626; color:#fff; }

    table{
      width:100%;
      border-collapse:collapse;
    }
    th,td{
      border:1px solid #ddd;
      padding:10px;
      text-align:center;
      font-size:14px;
    }
    th{ background:#f1f5f9; }

    .empty{
      text-align:center;
      padding:20px;
      color:#666;
    }

    @media(max-width:768px){
      .form-box{ grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Class Timetable</h2>

  <div class="form-box">
    <input id="cls" placeholder="Class (e.g. BCA-6)">
    <select id="day">
      <option value="">Select Day</option>
      <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
      <option>Thursday</option><option>Friday</option><option>Saturday</option>
    </select>
    <input id="subject" placeholder="Subject">
    <input id="time" placeholder="Time (10–11 AM)">
    <button class="add-btn" onclick="addTimeTable()">Add</button>
  </div>

  <div id="tableBox"></div>
</div>

<script>
  let timetable = JSON.parse(localStorage.getItem('simple_timetable')) || [];

  function addTimeTable(){
    const cls = document.getElementById('cls').value.trim();
    const day = document.getElementById('day').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const time = document.getElementById('time').value.trim();

    if(!cls || !day || !subject || !time){
      alert('Please fill all fields');
      return;
    }

    timetable.push({id:Date.now(), cls, day, subject, time});
    localStorage.setItem('simple_timetable', JSON.stringify(timetable));

    document.getElementById('cls').value='';
    document.getElementById('day').value='';
    document.getElementById('subject').value='';
    document.getElementById('time').value='';

    renderTable();
  }

  function deleteRow(id){
    timetable = timetable.filter(t => t.id !== id);
    localStorage.setItem('simple_timetable', JSON.stringify(timetable));
    renderTable();
  }

  function renderTable(){
    const box = document.getElementById('tableBox');
    if(timetable.length === 0){
      box.innerHTML = '<div class="empty">No timetable added</div>';
      return;
    }

    let html = `<table>
      <tr>
        <th>Class</th>
        <th>Day</th>
        <th>Subject</th>
        <th>Time</th>
        <th>Action</th>
      </tr>`;

    timetable.forEach(t => {
      html += `<tr>
        <td>${t.cls}</td>
        <td>${t.day}</td>
        <td>${t.subject}</td>
        <td>${t.time}</td>
        <td><button class="del-btn" onclick="deleteRow(${t.id})">Delete</button></td>
      </tr>`;
    });

    html += '</table>';
    box.innerHTML = html;
  }

  renderTable();
</script>

</body>
</html>
