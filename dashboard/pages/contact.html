<div class="card">
    <div class="card-header">
        <h3 class="card-title">
            <span class="card-icon">📞</span>
            Contact Technical Support
        </h3>
    </div>
    <div style="padding: 20px;">

        <div
            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 24px; border-radius: 12px; color: white; margin-bottom: 20px;">
            <h3 style="margin: 0 0 16px 0;">SchoolPad Support Team</h3>
            <div style="display: grid; gap: 12px;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="font-size: 24px;">📧</div>
                    <div>
                        <div style="font-size: 13px; opacity: 0.9;">Email</div>
                        <div style="font-weight: 600;">support@schoolpad.com</div>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="font-size: 24px;">📱</div>
                    <div>
                        <div style="font-size: 13px; opacity: 0.9;">Phone</div>
                        <div style="font-weight: 600;">+91 1800-123-4567 (Toll Free)</div>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="font-size: 24px;">⏰</div>
                    <div>
                        <div style="font-size: 13px; opacity: 0.9;">Support Hours</div>
                        <div style="font-weight: 600;">Mon-Sat: 9:00 AM - 6:00 PM</div>
                    </div>
                </div>
            </div>
        </div>

        <div style="background: var(--bg); padding: 24px; border-radius: 12px;">
            <h4 style="margin: 0 0 16px 0; color: var(--text);">Submit Support Ticket</h4>

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Issue
                    Category</label>
                <select
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
                    <option>Select category</option>
                    <option>Login Issues</option>
                    <option>Password Reset</option>
                    <option>Dashboard Not Loading</option>
                    <option>Fee Payment Problem</option>
                    <option>Report Upload Issue</option>
                    <option>Other Technical Issue</option>
                </select>
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Subject</label>
                <input type="text" placeholder="Brief description of the issue"
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Detailed
                    Description</label>
                <textarea rows="5" placeholder="Please describe your issue in detail..."
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; resize: vertical;"></textarea>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Attach
                    Screenshot (Optional)</label>
                <input type="file" accept="image/*"
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
            </div>

            <button
                style="width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
                Submit Ticket
            </button>
        </div>

        <div
            style="margin-top: 20px; padding: 16px; background: #f0f9ff; border-radius: 12px; border-left: 4px solid #3b82f6;">
            <p style="margin: 0; color: #1e40af; font-size: 14px;">
                <strong>ℹ️ Tip:</strong> For faster resolution, please include error messages and screenshots if
                applicable.
            </p>
        </div>

    </div>
</div>
