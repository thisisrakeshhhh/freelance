<div class="card">
    <div class="card-header">
        <h3 class="card-title">
            <span class="card-icon">📅</span>
            My Calendar (Events)
        </h3>
    </div>
    <div style="padding: 20px;">
        <div style="text-align: center; margin-bottom: 24px;">
            <h3 style="margin: 0 0 8px 0; color: var(--text);">December 2024</h3>
            <div style="display: flex; gap: 12px; justify-content: center; align-items: center;">
                <button
                    style="padding: 8px 12px; border: 1px solid var(--border); background: white; border-radius: 6px; cursor: pointer;">←
                    Prev</button>
                <button
                    style="padding: 8px 12px; border: 1px solid var(--border); background: white; border-radius: 6px; cursor: pointer;">Next
                    →</button>
            </div>
        </div>

        <div class="event-list">
            <div class="event-item">
                <div class="event-date">
                    <div class="event-day">15</div>
                    <div class="event-month">DEC</div>
                </div>
                <div class="event-details">
                    <div class="event-title">Data Structures Exam</div>
                    <div class="event-time">10:00 AM - 1:00 PM • Room 301</div>
                </div>
            </div>

            <div class="event-item">
                <div class="event-date" style="background: var(--success);">
                    <div class="event-day">18</div>
                    <div class="event-month">DEC</div>
                </div>
                <div class="event-details">
                    <div class="event-title">Project Presentation</div>
                    <div class="event-time">2:00 PM - 4:00 PM • Lab 2</div>
                </div>
            </div>

            <div class="event-item">
                <div class="event-date" style="background: var(--warning);">
                    <div class="event-day">20</div>
                    <div class="event-month">DEC</div>
                </div>
                <div class="event-details">
                    <div class="event-title">Database Systems Exam</div>
                    <div class="event-time">10:00 AM - 1:00 PM • Room 302</div>
                </div>
            </div>

            <div class="event-item">
                <div class="event-date" style="background: var(--purple);">
                    <div class="event-day">22</div>
                    <div class="event-month">DEC</div>
                </div>
                <div class="event-details">
                    <div class="event-title">Winter Break Begins 🎉</div>
                    <div class="event-time">All Day</div>
                </div>
            </div>
        </div>
    </div>
</div>
