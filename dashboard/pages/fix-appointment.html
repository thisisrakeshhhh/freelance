<div class="card">
    <div class="card-header">
        <h3 class="card-title">
            <span class="card-icon">🏥</span>
            Fix Appointment
        </h3>
    </div>
    <div style="padding: 20px;">
        <div style="background: var(--bg); padding: 24px; border-radius: 12px;">

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Appointment
                    With</label>
                <select
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
                    <option>Select person</option>
                    <option>Principal</option>
                    <option>Vice Principal</option>
                    <option>Academic Counselor</option>
                    <option>Department Head - CS</option>
                    <option>Career Guidance Officer</option>
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                <div>
                    <label
                        style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Date</label>
                    <input type="date"
                        style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
                </div>
                <div>
                    <label
                        style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Time</label>
                    <select
                        style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;">
                        <option>10:00 AM</option>
                        <option>11:00 AM</option>
                        <option>12:00 PM</option>
                        <option>2:00 PM</option>
                        <option>3:00 PM</option>
                        <option>4:00 PM</option>
                    </select>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 500;">Purpose of
                    Appointment</label>
                <textarea rows="4" placeholder="Briefly describe the purpose..."
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; resize: vertical;"></textarea>
            </div>

            <button
                style="width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
                Request Appointment
            </button>
        </div>
    </div>
</div>
