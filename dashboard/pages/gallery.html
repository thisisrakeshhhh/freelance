<div class="card">
    <div class="card-header">
        <h3 class="card-title">
            <span class="card-icon">🖼️</span>
            Photo Galleries
        </h3>
    </div>
    <div style="padding: 20px;">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">

            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 80px 20px 20px 20px; cursor: pointer; transition: transform 0.3s;"
                onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <h4 style="margin: 0; color: white; font-size: 16px;">Annual Sports Day 2024</h4>
                <p style="margin: 8px 0 0 0; color: rgba(255,255,255,0.9); font-size: 13px;">45 Photos</p>
            </div>

            <div style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 12px; padding: 80px 20px 20px 20px; cursor: pointer; transition: transform 0.3s;"
                onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <h4 style="margin: 0; color: white; font-size: 16px;">Cultural Fest 2024</h4>
                <p style="margin: 8px 0 0 0; color: rgba(255,255,255,0.9); font-size: 13px;">78 Photos</p>
            </div>

            <div style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border-radius: 12px; padding: 80px 20px 20px 20px; cursor: pointer; transition: transform 0.3s;"
                onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <h4 style="margin: 0; color: white; font-size: 16px;">Science Exhibition</h4>
                <p style="margin: 8px 0 0 0; color: rgba(255,255,255,0.9); font-size: 13px;">32 Photos</p>
            </div>

            <div style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); border-radius: 12px; padding: 80px 20px 20px 20px; cursor: pointer; transition: transform 0.3s;"
                onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <h4 style="margin: 0; color: white; font-size: 16px;">Freshers Welcome</h4>
                <p style="margin: 8px 0 0 0; color: rgba(255,255,255,0.9); font-size: 13px;">56 Photos</p>
            </div>

            <div style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); border-radius: 12px; padding: 80px 20px 20px 20px; cursor: pointer; transition: transform 0.3s;"
                onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <h4 style="margin: 0; color: #333; font-size: 16px;">Tech Symposium 2024</h4>
                <p style="margin: 8px 0 0 0; color: #666; font-size: 13px;">64 Photos</p>
            </div>

            <div style="background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); border-radius: 12px; padding: 80px 20px 20px 20px; cursor: pointer; transition: transform 0.3s;"
                onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <h4 style="margin: 0; color: #333; font-size: 16px;">Independence Day</h4>
                <p style="margin: 8px 0 0 0; color: #666; font-size: 13px;">28 Photos</p>
            </div>

        </div>
    </div>
</div>
