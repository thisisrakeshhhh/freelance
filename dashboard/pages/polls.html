<div class="card">
    <div class="card-header">
        <h3 class="card-title">
            <span class="card-icon">📊</span>
            Active Polls & Surveys
        </h3>
    </div>
    <div style="padding: 20px;">
        <div style="background: var(--bg); padding: 20px; border-radius: 12px; margin-bottom: 20px;">
            <h4 style="margin: 0 0 12px 0; color: var(--text);">📋 Campus Food Service Feedback</h4>
            <p style="margin: 0 0 16px 0; color: var(--text-light); font-size: 14px;">Help us improve the cafeteria
                experience</p>

            <div style="margin-bottom: 12px;">
                <label
                    style="display: flex; align-items: center; padding: 10px; background: white; border-radius: 8px; cursor: pointer; margin-bottom: 8px;">
                    <input type="radio" name="food" style="margin-right: 10px;">
                    <span>Excellent</span>
                </label>
                <label
                    style="display: flex; align-items: center; padding: 10px; background: white; border-radius: 8px; cursor: pointer; margin-bottom: 8px;">
                    <input type="radio" name="food" style="margin-right: 10px;">
                    <span>Good</span>
                </label>
                <label
                    style="display: flex; align-items: center; padding: 10px; background: white; border-radius: 8px; cursor: pointer; margin-bottom: 8px;">
                    <input type="radio" name="food" style="margin-right: 10px;">
                    <span>Average</span>
                </label>
                <label
                    style="display: flex; align-items: center; padding: 10px; background: white; border-radius: 8px; cursor: pointer;">
                    <input type="radio" name="food" style="margin-right: 10px;">
                    <span>Needs Improvement</span>
                </label>
            </div>

            <button
                style="width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                Submit Vote
            </button>
        </div>

        <div style="background: var(--bg); padding: 20px; border-radius: 12px;">
            <h4 style="margin: 0 0 12px 0; color: var(--text);">🎓 Preferred Time for Extra Classes</h4>
            <p style="margin: 0 0 16px 0; color: var(--text-light); font-size: 14px;">Vote ends: Dec 15, 2024</p>

            <div style="margin-bottom: 12px;">
                <label
                    style="display: flex; align-items: center; padding: 10px; background: white; border-radius: 8px; cursor: pointer; margin-bottom: 8px;">
                    <input type="radio" name="time" style="margin-right: 10px;">
                    <span>Morning (7:00 AM - 8:30 AM)</span>
                </label>
                <label
                    style="display: flex; align-items: center; padding: 10px; background: white; border-radius: 8px; cursor: pointer; margin-bottom: 8px;">
                    <input type="radio" name="time" style="margin-right: 10px;">
                    <span>Evening (4:00 PM - 5:30 PM)</span>
                </label>
                <label
                    style="display: flex; align-items: center; padding: 10px; background: white; border-radius: 8px; cursor: pointer;">
                    <input type="radio" name="time" style="margin-right: 10px;">
                    <span>Weekend (Saturday Morning)</span>
                </label>
            </div>

            <button
                style="width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                Submit Vote
            </button>
        </div>
    </div>
</div>
