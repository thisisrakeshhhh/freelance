<div class="card">
    <div class="card-header">
        <h3 class="card-title">
            <span class="card-icon">📅</span>
            My Appointments
        </h3>
    </div>
    <div style="padding: 20px;">
        <div class="subject-list">
            <div class="event-item">
                <div class="event-date" style="background: var(--success);">
                    <div class="event-day">14</div>
                    <div class="event-month">DEC</div>
                </div>
                <div class="event-details">
                    <div class="event-title">Meeting with Academic Counselor</div>
                    <div class="event-time">11:00 AM • Office Room 205</div>
                </div>
                <span class="attendance-badge attendance-good" style="align-self: center;">Confirmed</span>
            </div>

            <div class="event-item">
                <div class="event-date" style="background: var(--warning);">
                    <div class="event-day">16</div>
                    <div class="event-month">DEC</div>
                </div>
                <div class="event-details">
                    <div class="event-title">Career Guidance Session</div>
                    <div class="event-time">2:00 PM • Career Center</div>
                </div>
                <span class="attendance-badge attendance-warning" style="align-self: center;">Pending</span>
            </div>

            <div class="event-item">
                <div class="event-date" style="background: var(--text-light);">
                    <div class="event-day">10</div>
                    <div class="event-month">DEC</div>
                </div>
                <div class="event-details">
                    <div class="event-title">Department Head Discussion</div>
                    <div class="event-time">3:00 PM • CS Dept Office</div>
                </div>
                <span class="badge" style="align-self: center; background: #94a3b8;">Completed</span>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <button
                style="width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;">
                + Schedule New Appointment
            </button>
        </div>
    </div>
</div>
